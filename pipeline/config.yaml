# Where the study's datasets and documents live. Can be:
#   - a local path:        "./data/synthetic-study"
#   - a GitHub folder URL: "https://github.com/org/repo/tree/main/path/to/study"
#   - a Zenodo record URL: "https://zenodo.org/records/1234567"
#   - a direct archive:    "https://example.org/study-bundle.zip"
# URL sources are downloaded once into work_dir/study_cache/ and cached;
# pass --refresh-source to re-fetch.
study_source: "https://github.com/kerchner/canopy-metadata-cofest-2026/tree/main/data/synthetic-study"

# Scratch/output directory for this run: per-step logs + state.json
# (template IDs, instance IDs, URLs) so steps are independently re-runnable.
work_dir: "./work/run-001"

# The generic Canopy Study Template used in Task 1.
study_template_id: "https://repo.metadatacenter.org/templates/aff00b59-0bb7-4e40-9437-3216e5fb0ff7"

# Generated by: uv run scripts/download_mcps.py --cedar-key ... --bioportal-key ...
# (defaults to ~/mcp/mcpServers.json)
mcp_config_path: "~/mcp/mcpServers.json"

# Swap this for any tool-calling model your LLMBackend adapter supports.
model: "claude-sonnet-4-6"
