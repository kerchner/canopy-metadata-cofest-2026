type: template
name: Canopy Study Metadata Specification
modelVersion: 1.6.0
version: 0.0.1
status: draft
description: >-
  Study-level metadata for a Canopy data hub submission. The field set mirrors the
  Canopy study registration form (derived from the RADx Data Hub Study Metadata
  Specification). Plain-typed: controlled vocabularies are enforced by the Canopy
  application code-lists, not embedded in this template (matching the source template).
children:
  - key: title
    type: text-field
    name: Study Name
    configuration:
      required: true
  - key: description
    type: text-area-field
    name: Study Description
    configuration:
      required: true
  - key: center
    type: text-field
    name: Center
  - key: accessLevel
    type: radio-field
    name: Access Level
    values:
      - label: "Public"
      - label: "Limited"
      - label: "Private"
    configuration:
      required: true
  - key: has_ic
    type: radio-field
    name: Institutional Certification
    values:
      - label: "Yes"
      - label: "No"
  - key: data_sharing_info
    type: radio-field
    name: Data Sharing & Submission Information
    values:
      - label: "Yes"
      - label: "No"
  - key: pi_name
    type: text-field
    name: PI Name
    configuration:
      required: true
  - key: pi_email
    type: email-field
    name: PI Email
    configuration:
      required: true
  - key: pi_institution
    type: text-field
    name: PI Institution
    configuration:
      required: true
  - key: pi_assistant_name
    type: text-field
    name: Data Submitter Name
    configuration:
      required: true
  - key: pi_assistant_email
    type: email-field
    name: Data Submitter Email
    configuration:
      required: true
  - key: po_name
    type: text-field
    name: NIH Program Officer
    configuration:
      required: true
  - key: grant_number
    type: text-field
    name: Grant or Contract Number(s)
    configuration:
      required: true
      multiple: true
  - key: FOA_number
    type: text-field
    name: FOA Number
    configuration:
      required: true
      multiple: true
  - key: institutes_supporting_study
    type: text-field
    name: NIH Institute / Center
    configuration:
      required: true
      multiple: true
  - key: studystartdate
    type: temporal-field
    name: Study Start Date
    datatype: xsd:date
    granularity: day
    configuration:
      required: true
  - key: studyenddate
    type: temporal-field
    name: Study End Date
    datatype: xsd:date
    granularity: day
    configuration:
      required: true
  - key: data_submission_date
    type: temporal-field
    name: Submission Date
    datatype: xsd:date
    granularity: day
  - key: data_submission_timeline_details
    type: text-field
    name: Data submission timeline details
  - key: data_target_delivery_date
    type: temporal-field
    name: Target Data Delivery Date
    datatype: xsd:date
    granularity: day
  - key: estimated_participants
    type: numeric-field
    name: Estimated Number of Study Participants
    datatype: xsd:int
  - key: data_storage_size
    type: numeric-field
    name: Estimated Study Data Size (GB)
    datatype: xsd:decimal
  - key: is_multi_center
    type: radio-field
    name: Multi-Center Study
    values:
      - label: "Yes"
      - label: "No"
  - key: multi_center_sites
    type: text-field
    name: Study Sites
  - key: data_access_points
    type: text-field
    name: Data Availability
    configuration:
      multiple: true
  - key: topics
    type: text-field
    name: Study Domain
    configuration:
      required: true
      multiple: true
  - key: source
    type: text-field
    name: Data Collection Methods
    configuration:
      required: true
      multiple: true
  - key: study_population_focus
    type: text-field
    name: Study Population Focus
    configuration:
      required: true
      multiple: true
  - key: subject
    type: text-field
    name: Keywords
    configuration:
      required: true
      multiple: true
  - key: types
    type: text-field
    name: Study Design
    configuration:
      required: true
      multiple: true
  - key: CT_URL
    type: link-field
    name: Clinical Trials.gov URL
  - key: study_website_URL
    type: link-field
    name: Study Website URL
  - key: publication_URL
    type: link-field
    name: Primary Publication URL
    configuration:
      multiple: true
  - key: data_species
    type: text-field
    name: Species
    configuration:
      multiple: true
  - key: data_sample_collection
    type: text-field
    name: Sample Collection
    configuration:
      multiple: true
  - key: data_general_types
    type: text-field
    name: Data Types
    configuration:
      multiple: true
  - key: data_genomic
    type: text-field
    name: Genomic Data Types
    configuration:
      multiple: true
  - key: data_phenotype
    type: text-field
    name: Phenotypes
    configuration:
      multiple: true
  - key: data_sample_types
    type: text-field
    name: Sample Types
    configuration:
      multiple: true
  - key: data_genotype
    type: text-field
    name: Genotypes
    configuration:
      multiple: true
  - key: data_sequencing
    type: text-field
    name: Sequencing Data Types
    configuration:
      multiple: true
  - key: data_analyses
    type: text-field
    name: Genomic Analyses Types
    configuration:
      multiple: true
  - key: data_array_data
    type: text-field
    name: Genomic Array Data Types
    configuration:
      multiple: true
  - key: acknowledgement_statement
    type: text-area-field
    name: Acknowledgment Statement
    configuration:
      required: true
  - key: general_research_group
    type: text-field
    name: General Research Use
    configuration:
      multiple: true
  - key: health_biomed_group
    type: text-field
    name: Health/Medical/Biomedical
    configuration:
      multiple: true
  - key: disease_specific_group
    type: text-field
    name: Conditions/Diseases
    configuration:
      multiple: true
  - key: disease_specific_related_conditions
    type: text-field
    name: Related Conditions
  - key: other_group_description
    type: text-field
    name: Other Data Use Limitations
